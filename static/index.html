<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clever Tanken – Preise &amp; Vorhersage</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #08090c;
      --surface: rgba(18, 20, 26, 0.7);
      --surface-solid: #13161d;
      --border: rgba(255, 255, 255, 0.06);
      --border-hover: rgba(99, 102, 241, 0.25);
      --text: #f4f5f7;
      --text-soft: #9ca3af;
      --muted: #6b7280;
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.35);
      --success: #22c55e;
      --ease-out: cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --radius: 16px;
      --radius-sm: 10px;
      --chart-grid: rgba(255, 255, 255, 0.06);
      --chart-text: #a8b2c1;
      --tooltip-bg: rgba(24, 28, 36, 0.96);
      --tooltip-border: #2a3142;
    }
    [data-theme="light"] {
      --bg: #f5f6f8;
      --surface: rgba(255, 255, 255, 0.85);
      --surface-solid: #ffffff;
      --border: rgba(0, 0, 0, 0.08);
      --border-hover: rgba(99, 102, 241, 0.4);
      --text: #1a1d24;
      --text-soft: #4b5563;
      --muted: #6b7280;
      --accent: #4f46e5;
      --accent-glow: rgba(79, 70, 229, 0.25);
      --success: #16a34a;
      --chart-grid: rgba(0, 0, 0, 0.08);
      --chart-text: #4b5563;
      --tooltip-bg: rgba(255, 255, 255, 0.97);
      --tooltip-border: rgba(0, 0, 0, 0.1);
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    @keyframes bgShift {
      0%, 100% { opacity: 0.6; transform: scale(1) translate(0, 0); }
      50% { opacity: 0.8; transform: scale(1.05) translate(2%, -1%); }
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: clamp(1.5rem, 5vw, 3rem);
      min-height: 100vh;
      line-height: 1.55;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 100% 80% at 50% -30%, rgba(99, 102, 241, 0.18), transparent 50%),
                  radial-gradient(ellipse 60% 50% at 100% 50%, rgba(59, 130, 246, 0.06), transparent 50%);
      pointer-events: none;
      z-index: 0;
      animation: bgShift 20s ease-in-out infinite;
    }
    [data-theme="light"] body::before {
      background: radial-gradient(ellipse 100% 80% at 50% -30%, rgba(99, 102, 241, 0.08), transparent 50%),
                  radial-gradient(ellipse 60% 50% at 100% 50%, rgba(59, 130, 246, 0.04), transparent 50%);
    }
    .page-header {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 2.25rem;
      animation: fadeInUp 0.6s var(--ease-out) both;
    }
    .page-header .header-text { flex: 1; min-width: 200px; }
    h1 {
      font-size: clamp(1.6rem, 4vw, 2rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      margin: 0 0 0.4rem 0;
      color: var(--text);
    }
    .subtitle {
      color: var(--text-soft);
      font-size: 0.925rem;
      margin: 0;
      font-weight: 400;
      letter-spacing: 0.01em;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1.25rem;
      align-items: flex-end;
      margin-bottom: 2rem;
      animation: fadeInUp 0.6s var(--ease-out) 0.08s both;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .field label {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-soft);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .field select {
      background: var(--surface-solid);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.6rem 1rem;
      border-radius: var(--radius-sm);
      min-width: 200px;
      font-size: 0.9rem;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.3s var(--ease-out), box-shadow 0.3s var(--ease-out), transform 0.25s var(--ease-out);
    }
    .field select:hover {
      border-color: var(--border-hover);
      transform: translateY(-1px);
    }
    .field select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
      transform: translateY(-1px);
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
      margin-bottom: 2rem;
    }
    .card {
      position: relative;
      background: var(--surface);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      transition: border-color 0.35s var(--ease-out), transform 0.35s var(--ease-out), box-shadow 0.35s var(--ease-out);
      animation: fadeInUp 0.6s var(--ease-out) both;
    }
    .card:nth-child(1) { animation-delay: 0.14s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), transparent 40%, transparent 60%, rgba(34, 197, 94, 0.1));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.35s var(--ease-out);
      pointer-events: none;
    }
    .card:hover {
      border-color: var(--border-hover);
      transform: translateY(-3px);
      box-shadow: 0 12px 40px -12px rgba(0, 0, 0, 0.4);
    }
    [data-theme="light"] .card:hover {
      box-shadow: 0 12px 40px -12px rgba(0, 0, 0, 0.12);
    }
    .card:hover::after { opacity: 1; }
    .card h3 {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--muted);
      margin: 0 0 0.6rem 0;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .card .value {
      font-size: 1.55rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
      transition: color 0.3s var(--ease-out);
    }
    .card .value.accent { color: var(--accent); }
    .card .value.success { color: var(--success); }
    .card .hint {
      font-size: 0.8rem;
      color: var(--text-soft);
      margin-top: 0.55rem;
      line-height: 1.45;
    }
    .chart-wrap {
      position: relative;
      background: var(--surface);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      height: 380px;
      transition: border-color 0.35s var(--ease-out), box-shadow 0.35s var(--ease-out);
      animation: fadeInUp 0.6s var(--ease-out) 0.25s both;
    }
    .chart-wrap:hover {
      border-color: var(--border-hover);
      box-shadow: 0 12px 40px -12px rgba(0, 0, 0, 0.35);
    }
    [data-theme="light"] .chart-wrap:hover {
      box-shadow: 0 12px 40px -12px rgba(0, 0, 0, 0.1);
    }
    .chart-wrap.canvas-loaded { animation: fadeIn 0.4s var(--ease-out); }
    .chart-wrap canvas { max-height: 340px; }
    .loading { color: var(--text-soft); }
    .error {
      color: #f87171;
      font-size: 0.875rem;
      margin-top: 0.75rem;
      font-weight: 500;
    }
    .theme-toggle {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface-solid);
      color: var(--text-soft);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.3s var(--ease-out), background 0.3s var(--ease-out), color 0.3s var(--ease-out), transform 0.2s var(--ease-out);
    }
    .theme-toggle:hover {
      border-color: var(--border-hover);
      color: var(--text);
      transform: rotate(15deg);
    }
    .theme-toggle svg { width: 22px; height: 22px; }
    .theme-toggle .icon-dark { display: block; }
    .theme-toggle .icon-light { display: none; }
    [data-theme="light"] .theme-toggle .icon-dark { display: none; }
    [data-theme="light"] .theme-toggle .icon-light { display: block; }
    .station-details {
      font-size: 0.875rem;
      color: var(--text-soft);
      margin-bottom: 1.5rem;
      padding: 0.75rem 1rem;
      background: var(--surface-solid);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      min-height: 2.5rem;
      transition: opacity 0.3s var(--ease-out);
    }
    .station-details:empty { display: none; }
    .station-details .station-name { font-weight: 600; color: var(--text); margin-bottom: 0.25rem; }
    .station-details .station-address { margin-top: 0.2rem; }
  </style>
</head>
<body>
  <header class="page-header">
    <div class="header-text">
      <h1>Clever Tanken</h1>
      <p class="subtitle">Preise &amp; KI-Vorhersage – letzte 24 Stunden und Prognose für die nächsten 24 h</p>
    </div>
    <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Theme wechseln">
      <svg class="icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </header>

  <div class="controls">
    <div class="field">
      <label for="station">Station</label>
      <select id="station"></select>
    </div>
    <div class="field">
      <label for="fuel">Kraftstoffsorte</label>
      <select id="fuel"></select>
    </div>
  </div>
  <div class="station-details" id="station-details" aria-live="polite"></div>

  <div class="cards">
    <div class="card">
      <h3>Beste Uhrzeit zum Tanken</h3>
      <div id="best-time-value" class="value">–</div>
      <div id="best-time-hint" class="hint"></div>
    </div>
    <div class="card">
      <h3>Prognose (nächste 24 h)</h3>
      <div id="prediction-value" class="value">–</div>
      <div id="prediction-hint" class="hint">Ø erwarteter Preis</div>
    </div>
  </div>

  <div class="chart-wrap" id="chart-wrap">
    <canvas id="chart"></canvas>
    <div id="chart-error" class="error"></div>
  </div>

  <script>
    const API = ''; // gleicher Origin
    const THEME_KEY = 'clever-tanken-theme';
    let chart = null;

    function getTheme() {
      const saved = localStorage.getItem(THEME_KEY);
      if (saved === 'light' || saved === 'dark') return saved;
      return window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    }
    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem(THEME_KEY, theme);
      applyThemeToChart();
    }
    function applyThemeToChart() {
      if (!chart) return;
      const isLight = document.documentElement.getAttribute('data-theme') === 'light';
      const grid = isLight ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.06)';
      const text = isLight ? '#4b5563' : '#a8b2c1';
      const tooltipBg = isLight ? 'rgba(255,255,255,0.97)' : 'rgba(24,28,36,0.96)';
      const tooltipBorder = isLight ? 'rgba(0,0,0,0.1)' : '#2a3142';
      chart.options.scales.x.grid.color = grid;
      chart.options.scales.x.ticks.color = text;
      chart.options.scales.y.grid.color = grid;
      chart.options.scales.y.ticks.color = text;
      chart.options.scales.y.title.color = text;
      chart.options.plugins.legend.labels.color = text;
      chart.options.plugins.tooltip.backgroundColor = tooltipBg;
      chart.options.plugins.tooltip.borderColor = tooltipBorder;
      chart.update('none');
    }

    (function initTheme() {
      setTheme(getTheme());
      document.getElementById('theme-toggle').addEventListener('click', function() {
        const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        setTheme(next);
      });
    })();

    let stationsInfoById = {};

    async function loadStationsInfo() {
      try {
        const r = await fetch(API + '/static/stations.json');
        if (!r.ok) return;
        const list = await r.json();
        if (Array.isArray(list)) list.forEach(s => { stationsInfoById[String(s.id)] = s; });
      } catch (_) {}
    }

    async function getStations() {
      const r = await fetch(API + '/api/stations');
      if (!r.ok) throw new Error('Stationen konnten nicht geladen werden.');
      const j = await r.json();
      return j.stations || [];
    }

    function getStationLabel(sid) {
      const info = stationsInfoById[String(sid)];
      if (info && info.name) return info.name + ' (' + sid + ')';
      return 'Station ' + sid;
    }

    function fillSelects(stations) {
      const stationSel = document.getElementById('station');
      const fuelSel = document.getElementById('fuel');
      const detailsEl = document.getElementById('station-details');
      stationSel.innerHTML = '<option value="">Station wählen…</option>';
      fuelSel.innerHTML = '<option value="">Kraftstoffsorte wählen…</option>';

      const byStation = {};
      stations.forEach(s => {
        if (!byStation[s.station_id]) byStation[s.station_id] = [];
        byStation[s.station_id].push(s.fuel_type);
      });
      Object.keys(byStation).sort().forEach(sid => {
        stationSel.appendChild(new Option(getStationLabel(sid), sid));
      });

      function updateStationDetails() {
        const sid = stationSel.value;
        detailsEl.innerHTML = '';
        if (!sid) return;
        const info = stationsInfoById[String(sid)];
        if (!info) return;
        const name = document.createElement('div');
        name.className = 'station-name';
        name.textContent = info.name || 'Station ' + sid;
        detailsEl.appendChild(name);
        if (info.standort) {
          const loc = document.createElement('div');
          loc.textContent = info.standort;
          detailsEl.appendChild(loc);
        }
        const parts = [];
        if (info.adresse) parts.push(info.adresse);
        if (info.plz && info.ort) parts.push(info.plz + ' ' + info.ort); else if (info.plz) parts.push(info.plz); else if (info.ort) parts.push(info.ort);
        if (parts.length) {
          const addr = document.createElement('div');
          addr.className = 'station-address';
          addr.textContent = parts.join(', ');
          detailsEl.appendChild(addr);
        }
      }

      stationSel.addEventListener('change', () => {
        fuelSel.innerHTML = '<option value="">Kraftstoffsorte wählen…</option>';
        const fuels = byStation[stationSel.value] || [];
        fuels.forEach(ft => fuelSel.appendChild(new Option(ft, ft)));
        if (fuels.length === 1) fuelSel.selectedIndex = 0;
        updateStationDetails();
        updateData();
      });
      fuelSel.addEventListener('change', updateData);
    }

    async function updateData() {
      const sid = document.getElementById('station').value;
      const fuel = document.getElementById('fuel').value;
      if (!sid || !fuel) {
        setBestTime('–', '');
        setPrediction('–');
        if (chart) chart.data.datasets = [{ data: [] }, { data: [] }];
        if (chart) chart.update('none');
        return;
      }
      const enc = encodeURIComponent;
      try {
        const [pricesRes, predRes, bestRes] = await Promise.all([
          fetch(API + `/api/prices?station_id=${enc(sid)}&fuel_type=${enc(fuel)}&hours=24`),
          fetch(API + `/api/prediction?station_id=${enc(sid)}&fuel_type=${enc(fuel)}`),
          fetch(API + `/api/best-time?station_id=${enc(sid)}&fuel_type=${enc(fuel)}`),
        ]);
        const pricesJson = await pricesRes.json();
        const predJson = predRes.ok ? await predRes.json() : null;
        const bestJson = bestRes.ok ? await bestRes.json() : null;

        const data = (pricesJson.data || []).map(d => ({ x: new Date(d.time), y: d.price }));
        const points = (predJson && predJson.points) || [];
        const predPrice = predJson && predJson.predicted_price != null ? predJson.predicted_price : null;
        const predPoint = points.map(d => ({ x: new Date(d.time), y: d.price }));

        if (bestJson) {
          const msg = bestJson.message || '';
          const hour = bestJson.best_hour;
          setBestTime(hour != null ? `${String(hour).padStart(2, '0')}:00 Uhr` : '–', msg);
        } else {
          setBestTime('–', '');
        }
        if (predPrice != null) {
          setPrediction(predPrice.toFixed(2) + ' €', true);
        } else {
          setPrediction('–', false);
        }

        if (!chart) {
          chart = new Chart(document.getElementById('chart'), {
            type: 'line',
            data: {
              datasets: [
                { label: 'Letzte 24 h (Ist)', data, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true, tension: 0.25, pointRadius: 0, pointHoverRadius: 4 },
                { label: 'Prognose (nächste 24 h)', data: predPoint, borderColor: '#22c55e', backgroundColor: 'rgba(34, 197, 94, 0.08)', fill: true, pointRadius: 0, pointHoverRadius: 4, tension: 0.25 },
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              animation: { duration: 800 },
              transition: { duration: 400 },
              interaction: { intersect: false, mode: 'index' },
              scales: {
                x: {
                  type: 'time',
                  time: { unit: 'hour', displayFormats: { minute: 'HH:mm', hour: 'HH:mm', day: 'dd.MM.' } },
                  grid: { color: 'rgba(255,255,255,0.06)' },
                  ticks: { color: '#a8b2c1', font: { size: 11 } },
                },
                y: {
                  beginAtZero: false,
                  title: { display: true, text: 'Preis (€/l)', color: '#a8b2c1', font: { size: 12 } },
                  grid: { color: 'rgba(255,255,255,0.06)' },
                  ticks: { color: '#a8b2c1', font: { size: 11 }, callback: function(v) { return v.toFixed(2) + ' €'; } },
                },
              },
              plugins: {
                legend: {
                  position: 'top',
                  align: 'end',
                  labels: { color: '#a8b2c1', font: { size: 12 }, usePointStyle: true, padding: 16 },
                },
                tooltip: {
                  backgroundColor: 'rgba(24, 28, 36, 0.96)',
                  titleColor: '#f0f2f5',
                  bodyColor: '#e2e6eb',
                  borderColor: '#2a3142',
                  borderWidth: 1,
                  padding: 12,
                  displayColors: true,
                  callbacks: {
                    label: function(context) {
                      const v = context.parsed.y;
                      return context.dataset.label + ': ' + (typeof v === 'number' ? v.toFixed(2) : v) + ' €';
                    },
                  },
                },
              },
            },
          });
          applyThemeToChart();
        } else {
          chart.data.datasets[0].data = data;
          chart.data.datasets[1].data = predPoint;
          chart.update('active');
        }
        document.getElementById('chart-wrap').classList.add('canvas-loaded');
        document.getElementById('chart-error').textContent = '';
      } catch (e) {
        document.getElementById('chart-error').textContent = e.message || 'Fehler beim Laden.';
        setBestTime('–', '');
        setPrediction('–');
      }
    }

    function setBestTime(val, hint) {
      const el = document.getElementById('best-time-value');
      el.textContent = val;
      el.classList.toggle('success', val !== '–');
      document.getElementById('best-time-hint').textContent = hint;
    }
    function setPrediction(val, hasValue) {
      const el = document.getElementById('prediction-value');
      el.textContent = val;
      el.classList.toggle('accent', !!hasValue);
    }

    (async () => {
      try {
        await loadStationsInfo();
        const stations = await getStations();
        fillSelects(stations);
      } catch (e) {
        document.getElementById('chart-error').textContent = e.message || 'API nicht erreichbar.';
      }
    })();
  </script>
</body>
</html>
